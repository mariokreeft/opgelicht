<!DOCTYPE html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Fraude Radar Nederland</title><style>body{font-family:Segoe UI,sans-serif;background:#f5f7fb;color:#243447;max-width:1200px;margin:auto;padding:20px}h1{color:#0f6cbd}.card{background:#fff;border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}input{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc}.risk{font-size:.85em;padding:4px 8px;border-radius:999px;background:#fde7e9}a{color:#0f6cbd}</style></head><body><h1>🛡️ Fraude Radar Nederland</h1><p>Live Fraudehelpdesk alerts</p><input id='q' placeholder='Zoeken...'><div id='alerts'></div><script>const FEED='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent('https://www.fraudehelpdesk.nl/feed/?post_type=alert');async function load(){let d=await fetch(FEED).then(r=>r.json());let items=d.items||[];window.items=items;render();}function render(){let q=(document.getElementById('q').value||'').toLowerCase();document.getElementById('alerts').innerHTML=(window.items||[]).filter(i=>(i.title+i.description).toLowerCase().includes(q)).map(i=>'<div class=card><div class=risk>Alert</div><h3>'+i.title+'</h3><p>'+new Date(i.pubDate).toLocaleDateString('nl-NL')+'</p><a href='+i.link+' target=_blank>Lees bericht</a></div>').join('')}document.getElementById('q').oninput=render;load();</script></body></html>
