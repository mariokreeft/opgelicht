<!DOCTYPE html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Fraude Radar Nederland</title><style>body{font-family:Segoe UI,sans-serif;background:#f3f6fb;color:#243447;margin:0}header{background:white;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.05)}main{max-width:1200px;margin:auto;padding:20px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.tile,.card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.tile{padding:20px;text-align:center}.num{font-size:2rem;color:#0f6cbd;font-weight:bold}input{width:100%;padding:14px;border-radius:12px;border:1px solid #d0d7de;margin:20px 0}.cards{display:grid;gap:14px}.card{padding:18px}.high{background:#fde7e9}.medium{background:#fff4ce}.low{background:#dff6dd}.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:.8em}a{color:#0f6cbd}</style></head><body><header><h1>🛡️ Fraude Radar Nederland</h1><div id='updated'>Live Fraudehelpdesk waarschuwingen</div></header><main><div class='stats'><div class='tile'><div id='total' class='num'>-</div>Alerts</div><div class='tile'><div id='high' class='num'>-</div>Hoog risico</div><div class='tile'><div id='week' class='num'>-</div>Afgelopen 7 dagen</div></div><input id='q' placeholder='Zoek op PayPal, politie, sms, BSN...'><div id='cards' class='cards'></div></main><script>const FEED='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent('https://www.fraudehelpdesk.nl/feed/?post_type=alert');function risk(t){t=t.toLowerCase();if(/paypal|politie|europol|belasting|bsn|ideal|klarna/.test(t))return'high';if(/sms|visum|eta|beleggen/.test(t))return'medium';return'low'}async function load(){const d=await fetch(FEED).then(r=>r.json());window.items=d.items||[];document.getElementById('updated').innerText='Laatste update: '+new Date().toLocaleString('nl-NL');render()}function render(){const q=document.getElementById('q').value.toLowerCase();let items=(window.items||[]).filter(i=>(i.title+i.description).toLowerCase().includes(q));let hc=0,wc=0;const weekAgo=Date.now()-604800000;document.getElementById('total').innerText=items.length;items.forEach(i=>{if(risk(i.title+i.description)=='high')hc++;if(new Date(i.pubDate).getTime()>weekAgo)wc++;});document.getElementById('high').innerText=hc;document.getElementById('week').innerText=wc;document.getElementById('cards').innerHTML=items.map(i=>{let r=risk(i.title+i.description);let act=r=='high'?'Niet klikken, niet bellen, niet betalen.':r=='medium'?'Controleer de afzender zorgvuldig.':'Blijf alert.';return `<div class='card'><span class='badge ${r}'>${r.toUpperCase()}</span><h3>${i.title}</h3><p>${new Date(i.pubDate).toLocaleDateString('nl-NL')}</p><p>${(i.description||'').replace(/<[^>]+>/g,'').substring(0,250)}...</p><strong>Wat moet ik doen?</strong><p>${act}</p><a target='_blank' href='${i.link}'>Lees origineel bericht</a></div>`}).join('')}q.oninput=render;load();</script></body></html>
